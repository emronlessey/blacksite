<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Blacksite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar">
    <div>
      <p class="small-label">Escape Room Game</p>
      <h1 class="site-title">MINI BLACKSITE</h1>
      <p class="site-subtitle">with 3 simple puzzles</p>
    </div>

    <div class="hud" aria-live="polite">
      <div class="pill">Step <strong id="step">1</strong>/3</div>
      <div class="pill">Time <strong id="time">02:00</strong></div>
      <div class="pill">Hints <strong id="hints">0</strong>/3</div>
    </div>
  </header>

  <main class="page">
    <section class="panel">
      <div class="panel-top">
        <h2 id="title">Loading...</h2>
        <p id="description" class="muted">Please wait.</p>
      </div>

      <section id="gameArea" class="game-box"></section>

      <div class="button-row">
        <button id="startBtn" class="start">Start</button>
        <button id="submitBtn" class="Submit">Submit</button>
        <button id="nextBtn" class="Next">Next</button>
		
      </div>

      <div class="button-row secondary-buttons">
        <button id="hintBtn" class="hint">Hint</button>
        <button id="saveBtn" class="Save">Save</button>
        <button id="resetBtn" class="danger">Reset</button>
		
      </div>
    </section>

    <aside class="panel">
  
      <h2>System Log</h2>
      <div id="log" class="log"></div>
    </aside>
  </main>

  <script src="script.js"></script>
  
  <audio id="alarmSound" src="alarm.mp3" loop></audio>  <!--!alarmSound -->
</body>
</html>
